<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndoTag - Profil</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profil.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1>INDOTAG<span>PROFIL</span></h1>
            </div>
            <div class="user-profile" id="userProfile" style="display: none;">
                <!-- Hidden karena profil ditampilkan di bawah -->
            </div>
        </header>

        <!-- Profile Content -->
        <div class="profile-container">
            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">
                    <img src="" alt="avatar" id="profileAvatarImg" style="display: none;">
                    <span id="profileAvatarText">G</span>
                </div>
                <div class="profile-info">
                    <h2 id="profileName">Guest User</h2>
                    <div class="profile-username" id="profileUsername">@guest_user</div>
                    <div class="profile-badge" id="profileBadge">👤 User</div>
                </div>
            </div>

            <!-- Add Username Button -->
            <div class="add-username-container">
                <button class="add-username-btn" id="addUsernameBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    ADD USERNAME
                </button>
            </div>

            <!-- Asset Stats Card -->
            <div class="asset-stats-card">
                <div class="asset-stat-item left">
                    <span class="asset-stat-label">Aset profil</span>
                    <span class="asset-stat-value" id="assetCount">0</span>
                </div>
                <div class="asset-stat-item center">
                    <span class="asset-stat-label">Dibeli/Terjual</span>
                    <span class="asset-stat-value" id="boughtSoldCount">12/5</span>
                </div>
                <div class="asset-stat-item right">
                    <span class="asset-stat-label">Total Volume</span>
                    <span class="asset-stat-value" id="totalVolume">Rp100.000</span>
                </div>
            </div>

            <!-- User Info Details -->
            <div class="info-section">
                <h3>Informasi Akun</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">User ID</span>
                        <span class="info-value" id="infoUserId">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Bergabung</span>
                        <span class="info-value" id="infoJoinDate">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Terakhir Login</span>
                        <span class="info-value" id="infoLastLogin">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Status Premium</span>
                        <span class="info-value" id="infoPremium">Tidak</span>
                    </div>
                </div>
            </div>

            <!-- My Usernames Section -->
            <div class="my-usernames-section">
                <h3>Username Saya</h3>
                <div class="my-usernames-grid" id="myUsernamesGrid">
                    <div class="loading">Memuat data...</div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
          <a href="/order/games.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="6" width="20" height="12" rx="2" />
              <path d="M6 12h4M14 12h4M8 10v4M16 10v4" />
            </svg>
            <span>GAMES</span>
          </a>
          <a href="/order/index.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            <span>MARKET</span>
          </a>
          <a href="/order/profil.html" class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <span>PROFIL</span>
          </a>
        </nav>

    <script src="js/main.js"></script>
    <script src="js/profil.js"></script>
</body>
</html>
