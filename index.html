<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INDOTAG MARKET</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome 6 (untuk icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/order/css/style.css">
    
    <!-- Config -->
    <script src="/order/config.js"></script>
</head>
<body>
    <!-- Top Border Card - Fixed -->
    <div class="top-border-card">
        <div class="top-border-content">
            <div class="app-title">
                <i class="fas fa-crown app-logo"></i>
                <h1 id="appTitle">INDOTAG</h1>
            </div>
            <div class="user-info" id="userInfo">
                <div class="profile-loading">
                    <div class="spinner small"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter Bar - Fixed dengan efek 3D -->
    <div class="filter-bar" id="filterBar">
        <div class="filter-header" onclick="toggleFilterPanel()">
            <span><i class="fas fa-sliders-h"></i> Filter & Cari Username</span>
            <i class="fas fa-chevron-down filter-arrow"></i>
        </div>
        
        <div class="filter-panel" id="filterPanel">
            <!-- Search Box -->
            <div class="filter-section">
                <div class="filter-label"><i class="fas fa-search"></i> Cari Username / Based On</div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" class="filter-input" id="searchInput" placeholder="Contoh: username atau based on" oninput="debounceSearch()">
                </div>
            </div>
            
            <!-- Based On Filter -->
            <div class="filter-section">
                <div class="filter-label"><i class="fas fa-tag"></i> Based On</div>
                <select class="filter-select" id="basedOnFilter" onchange="applyFilters()">
                    <option value="">Semua Based On</option>
                </select>
            </div>
            
            <!-- Type Filter -->
            <div class="filter-section">
                <div class="filter-label"><i class="fas fa-layer-group"></i> Tipe Username</div>
                <div class="type-buttons" id="typeFilter">
                    <button class="type-btn active" data-type=""><i class="fas fa-globe"></i> Semua</button>
                    <button class="type-btn" data-type="UNCOMMON"><i class="fas fa-star"></i> UNCOMMON</button>
                    <button class="type-btn" data-type="COMMON"><i class="fas fa-shield-alt"></i> COMMON</button>
                </div>
                <div class="subtype-buttons" id="subtypeFilter">
                    <button class="subtype-btn" data-subtype="OP"><i class="fas fa-bullseye"></i> OP</button>
                    <button class="subtype-btn" data-subtype="SOP"><i class="fas fa-adjust"></i> SOP</button>
                    <button class="subtype-btn" data-subtype="CANON"><i class="fas fa-exchange-alt"></i> CANON</button>
                    <button class="subtype-btn" data-subtype="SCANON"><i class="fas fa-plus-circle"></i> SCANON</button>
                    <button class="subtype-btn" data-subtype="TAMPING"><i class="fas fa-arrow-left"></i> TAMPING</button>
                    <button class="subtype-btn" data-subtype="TAMDAL"><i class="fas fa-arrows-alt-h"></i> TAMDAL</button>
                    <button class="subtype-btn" data-subtype="GANHUR"><i class="fas fa-sync-alt"></i> GANHUR</button>
                    <button class="subtype-btn" data-subtype="SWITCH"><i class="fas fa-random"></i> SWITCH</button>
                    <button class="subtype-btn" data-subtype="KURHUF"><i class="fas fa-minus-circle"></i> KURHUF</button>
                </div>
            </div>
            
            <!-- Price Range -->
            <div class="filter-section">
                <div class="filter-label"><i class="fas fa-coins"></i> Range Harga (Rp)</div>
                <div class="price-range">
                    <div class="price-input-wrapper">
                        <i class="fas fa-arrow-right"></i>
                        <input type="number" class="filter-input price-input" id="minPrice" placeholder="Min" value="0" onchange="applyFilters()">
                    </div>
                    <span class="price-separator">—</span>
                    <div class="price-input-wrapper">
                        <i class="fas fa-arrow-left"></i>
                        <input type="number" class="filter-input price-input" id="maxPrice" placeholder="Max" value="999999999" onchange="applyFilters()">
                    </div>
                </div>
            </div>
            
            <!-- Sort By -->
            <div class="filter-section">
                <div class="filter-label"><i class="fas fa-sort-amount-down"></i> Urutkan</div>
                <select class="filter-select" id="sortBy" onchange="applyFilters()">
                    <option value="latest"><i class="fas fa-clock"></i> Terbaru</option>
                    <option value="price_low"><i class="fas fa-arrow-up"></i> Harga: Rendah ke Tinggi</option>
                    <option value="price_high"><i class="fas fa-arrow-down"></i> Harga: Tinggi ke Rendah</option>
                    <option value="char_asc"><i class="fas fa-sort-alpha-up"></i> Karakter: Sedikit ke Banyak</option>
                    <option value="char_desc"><i class="fas fa-sort-alpha-down"></i> Karakter: Banyak ke Sedikit</option>
                </select>
            </div>
            
            <!-- Apply Button dengan efek 3D -->
            <button class="apply-filter-btn" onclick="applyFilters()">
                <i class="fas fa-check-circle"></i> Terapkan Filter
            </button>
        </div>
    </div>

    <!-- Bottom Border Scroll Container -->
    <div class="bottom-border-scroll" id="scrollContainer">
        <!-- Pull to refresh indicator (visual only) -->
        <div class="pull-visual">
            <div class="pull-indicator">
                <i class="fas fa-arrow-down pull-arrow"></i>
                <span>Tarik ke bawah</span>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- MARKET Page -->
            <div class="page active" id="marketPage">
                <div class="content-card glass-effect">
                    <div class="card-header">
                        <i class="fas fa-store"></i>
                        <h2>Marketplace</h2>
                        <span class="header-badge" id="marketCount">0</span>
                    </div>
                    <div class="market-items" id="marketItems">
                        <!-- Loading state akan ditampilkan di sini -->
                    </div>
                </div>
            </div>

            <!-- MY USERNAMES Page -->
            <div class="page" id="gamesPage">
                <div class="content-card glass-effect">
                    <div class="card-header">
                        <i class="fas fa-database"></i>
                        <h2>My Usernames</h2>
                        <span class="header-badge" id="usernamesCount">0</span>
                    </div>
                    <div class="games-items" id="gamesItems">
                        <!-- Usernames user akan ditampilkan di sini -->
                    </div>
                </div>
            </div>

            <!-- ACTIVITY Page -->
            <div class="page" id="activityPage">
                <div class="content-card glass-effect">
                    <div class="card-header">
                        <i class="fas fa-chart-line"></i>
                        <h2>Activity Log</h2>
                    </div>
                    <div class="activity-items" id="activityItems">
                        <!-- Activity logs akan ditampilkan di sini -->
                    </div>
                </div>
            </div>

            <!-- PROFILE Page -->
            <div class="page" id="profilePage">
                <div class="content-card glass-effect">
                    <div class="card-header">
                        <i class="fas fa-user-circle"></i>
                        <h2>Profile</h2>
                    </div>
                    <div class="profile-details" id="profileDetails">
                        <!-- Profile info akan ditampilkan di sini -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Floating Navigation (fixed di bagian bawah) -->
        <nav class="floating-nav glass-effect" id="floatingNav">
            <button class="nav-item active" data-page="market">
                <i class="fas fa-store"></i>
                <span>MARKET</span>
            </button>
            <button class="nav-item" data-page="games">
                <i class="fas fa-database"></i>
                <span>MY USN</span>
            </button>
            <button class="nav-item" data-page="activity">
                <i class="fas fa-history"></i>
                <span>ACTIVITY</span>
            </button>
            <button class="nav-item" data-page="profile">
                <i class="fas fa-user"></i>
                <span>PROFIL</span>
            </button>
        </nav>
    </div>

    <!-- JavaScript -->
    <script src="/order/js/script.js"></script>
</body>
</html>
