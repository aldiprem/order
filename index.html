<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndoTag Marketplace</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1>INDOTAG<span>MARKET</span></h1>
            </div>
            <div class="user-profile" id="userProfile">
                <div class="user-avatar" id="userAvatar">G</div>
                <span class="username" id="displayName">guest_user</span>
            </div>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <div class="search-input-wrapper">
                    <input type="text" id="searchInput" placeholder="Cari username...">
                    <button class="clear-search" id="clearSearch" style="display: none;">×</button>
                </div>
                <button id="searchBtn">Cari</button>
            </div>
            
            <!-- Filter Bar -->
            <div class="filter-bar">
                <button class="filter-toggle" id="filterToggle">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="22 3 2 3 10 13 10 21 14 18 14 13 22 3" />
                    </svg>
                    FILTERS
                </button>
                <div class="active-filters" id="activeFilters"></div>
            </div>
        </div>

        <!-- Filter Panel (Hidden by default) -->
        <div class="filter-panel" id="filterPanel">
            <div class="filter-panel-header">
                <h3>Filter Username</h3>
                <button class="close-filter" id="closeFilter">×</button>
            </div>
            
            <div class="filter-panel-content">
                <!-- Sort By -->
                <div class="filter-group">
                    <label class="filter-label">Sort By</label>
                    <div class="filter-options">
                        <button class="filter-option" data-sort="newest">Terbaru</button>
                        <button class="filter-option" data-sort="price_asc">Harga Terendah</button>
                        <button class="filter-option" data-sort="price_desc">Harga Tertinggi</button>
                        <button class="filter-option" data-sort="name_asc">Nama A-Z</button>
                    </div>
                </div>

                <!-- Price Range -->
                <div class="filter-group">
                    <label class="filter-label">Price Range ($)</label>
                    <div class="price-range">
                        <input type="number" id="minPrice" placeholder="Min" min="0" value="0">
                        <span>to</span>
                        <input type="number" id="maxPrice" placeholder="Max" min="0" value="1000">
                    </div>
                </div>

                <!-- Type Based On (Categories) -->
                <div class="filter-group">
                    <label class="filter-label">Type Based On</label>
                    <div class="filter-options grid-2">
                        <button class="filter-option category-option active" data-category="all">Semua</button>
                        <button class="filter-option category-option" data-category="idol">Idol K-Pop</button>
                        <button class="filter-option category-option" data-category="mulchar">Multichar</button>
                        <button class="filter-option category-option" data-category="anime">Anime</button>
                        <button class="filter-option category-option" data-category="game">Game</button>
                        <button class="filter-option category-option" data-category="common">Common</button>
                        <button class="filter-option category-option" data-category="uncommon">Uncommon</button>
                    </div>
                </div>

                <!-- Style Username (Types) -->
                <div class="filter-group">
                    <label class="filter-label">Style Username</label>
                    <div class="filter-options grid-3">
                        <button class="filter-option type-option active" data-type="all">Semua</button>
                        <button class="filter-option type-option" data-type="OP">OP</button>
                        <button class="filter-option type-option" data-type="SOP">SOP</button>
                        <button class="filter-option type-option" data-type="CANON">Canon</button>
                        <button class="filter-option type-option" data-type="SCANON">Scanon</button>
                        <button class="filter-option type-option" data-type="TAMPING">Tamping</button>
                        <button class="filter-option type-option" data-type="TAMDAL">Tamdal</button>
                        <button class="filter-option type-option" data-type="GANHUR">Ganhur</button>
                        <button class="filter-option type-option" data-type="SWITCH">Switch</button>
                        <button class="filter-option type-option" data-type="KURHUF">Kurhuf</button>
                    </div>
                </div>

                <!-- Status -->
                <div class="filter-group">
                    <label class="filter-label">Status</label>
                    <div class="filter-options">
                        <button class="filter-option status-option active" data-status="all">Semua</button>
                        <button class="filter-option status-option" data-status="available">Tersedia</button>
                        <button class="filter-option status-option" data-status="sold">Terjual</button>
                    </div>
                </div>
            </div>

            <div class="filter-panel-footer">
                <button class="btn-reset" id="resetFilters">Reset</button>
                <button class="btn-apply" id="applyFilters">Terapkan Filter</button>
            </div>
        </div>

        <!-- Overlay -->
        <div class="filter-overlay" id="filterOverlay"></div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Total</span>
                <span class="stat-value" id="totalCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Available</span>
                <span class="stat-value" id="availableCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Sold</span>
                <span class="stat-value" id="soldCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Min Price</span>
                <span class="stat-value" id="minPriceStat">$0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Max Price</span>
                <span class="stat-value" id="maxPriceStat">$0</span>
            </div>
        </div>

        <!-- Username Grid -->
        <div class="username-grid" id="usernameGrid">
            <!-- Data akan diisi oleh JavaScript -->
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
