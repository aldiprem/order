<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="HandheldFriendly" content="true">
    <meta name="MobileOptimized" content="width">
    <title>INDOTAG MARKET</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome 6 (untuk icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/order/css/style.css">
    
    <!-- Config -->
    <script src="/order/config.js"></script>
</head>
<body>
    <!-- Top Border Card - Fixed -->
    <div class="top-border-card" id="topBorder">
        <div class="top-border-content">
            <div class="app-title">
                <span class="app-logo">⚡</span>
                <h1 id="appTitle">INDOTAG</h1>
            </div>
            <div class="user-info" id="userInfo">
                <div class="profile-loading">
                    <div class="spinner small"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter Bar - Fixed -->
    <div class="filter-bar" id="filterBar">
        <div class="filter-header" onclick="toggleFilterPanel()">
            <span><span class="filter-header-icon">🔍</span> Filter & Cari Username</span>
            <span class="filter-arrow">▼</span>
        </div>
        
        <div class="filter-panel" id="filterPanel">
            <!-- Search Box -->
            <div class="filter-section">
                <div class="filter-label"><span class="filter-label-icon">🔎</span> Cari Username / Based On</div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="filter-input" id="searchInput" placeholder="Contoh: username atau based on" oninput="debounceSearch()">
                </div>
            </div>
            
            <!-- Based On Filter -->
            <div class="filter-section">
                <div class="filter-label"><span class="filter-label-icon">🏷️</span> Based On</div>
                <select class="filter-select" id="basedOnFilter" onchange="applyFilters()">
                    <option value="">Semua Based On</option>
                </select>
            </div>
            
            <!-- Type Filter -->
            <div class="filter-section">
                <div class="filter-label"><span class="filter-label-icon">📊</span> Tipe Username</div>
                <div class="type-buttons" id="typeFilter">
                    <button class="type-btn active" data-type=""><span>🌐</span> Semua</button>
                    <button class="type-btn" data-type="UNCOMMON"><span>⭐</span> UNCOMMON</button>
                    <button class="type-btn" data-type="COMMON"><span>🛡️</span> COMMON</button>
                </div>
                <div class="subtype-buttons" id="subtypeFilter">
                    <button class="subtype-btn" data-subtype="OP"><span>🎯</span> OP</button>
                    <button class="subtype-btn" data-subtype="SOP"><span>⚖️</span> SOP</button>
                    <button class="subtype-btn" data-subtype="CANON"><span>🔄</span> CANON</button>
                    <button class="subtype-btn" data-subtype="SCANON"><span>➕</span> SCANON</button>
                    <button class="subtype-btn" data-subtype="TAMPING"><span>⬅️</span> TAMPING</button>
                    <button class="subtype-btn" data-subtype="TAMDAL"><span>↔️</span> TAMDAL</button>
                    <button class="subtype-btn" data-subtype="GANHUR"><span>🔄</span> GANHUR</button>
                    <button class="subtype-btn" data-subtype="SWITCH"><span>🔀</span> SWITCH</button>
                    <button class="subtype-btn" data-subtype="KURHUF"><span>➖</span> KURHUF</button>
                </div>
            </div>
            
            <!-- Price Range -->
            <div class="filter-section">
                <div class="filter-label"><span class="filter-label-icon">💰</span> Range Harga (Rp)</div>
                <div class="price-range">
                    <div class="price-input-wrapper">
                        <span class="price-icon">▶️</span>
                        <input type="number" class="filter-input price-input" id="minPrice" placeholder="Min" value="0" onchange="applyFilters()">
                    </div>
                    <span class="price-separator">—</span>
                    <div class="price-input-wrapper">
                        <span class="price-icon">◀️</span>
                        <input type="number" class="filter-input price-input" id="maxPrice" placeholder="Max" value="999999999" onchange="applyFilters()">
                    </div>
                </div>
            </div>
            
            <!-- Sort By -->
            <div class="filter-section">
                <div class="filter-label"><span class="filter-label-icon">📋</span> Urutkan</div>
                <select class="filter-select" id="sortBy" onchange="applyFilters()">
                    <option value="latest"><span>🕒</span> Terbaru</option>
                    <option value="price_low"><span>⬆️</span> Harga: Rendah ke Tinggi</option>
                    <option value="price_high"><span>⬇️</span> Harga: Tinggi ke Rendah</option>
                    <option value="char_asc"><span>🔤</span> Karakter: Sedikit ke Banyak</option>
                    <option value="char_desc"><span>🔡</span> Karakter: Banyak ke Sedikit</option>
                </select>
            </div>
            
            <!-- Apply Button -->
            <button class="apply-filter-btn" onclick="applyFilters()">
                <span>✅</span> Terapkan Filter
            </button>
        </div>
    </div>

    <!-- Main Content Container -->
    <div class="main-container" id="mainContainer">
        <!-- Pull to refresh indicator -->
        <div class="pull-indicator-wrapper" id="pullIndicator">
            <div class="pull-indicator">
                <span class="pull-arrow">⬇️</span>
                <span class="pull-text">Tarik untuk refresh</span>
            </div>
        </div>

        <!-- Pages Container -->
        <div class="pages-container" id="pagesContainer">
            <!-- MARKET Page -->
            <div class="page active" id="marketPage">
                <div class="content-card">
                    <div class="card-header">
                        <span class="card-header-icon">🏪</span>
                        <h2>Marketplace</h2>
                        <span class="header-badge" id="marketCount">0</span>
                    </div>
                    <div class="market-items" id="marketItems">
                        <!-- Loading state akan ditampilkan di sini -->
                    </div>
                </div>
            </div>

            <!-- MY USERNAMES Page -->
            <div class="page" id="gamesPage">
                <div class="content-card">
                    <div class="card-header">
                        <span class="card-header-icon">📦</span>
                        <h2>My Usernames</h2>
                        <span class="header-badge" id="usernamesCount">0</span>
                    </div>
                    <div class="games-items" id="gamesItems">
                        <!-- Usernames user akan ditampilkan di sini -->
                    </div>
                </div>
            </div>

            <!-- ACTIVITY Page -->
            <div class="page" id="activityPage">
                <div class="content-card">
                    <div class="card-header">
                        <span class="card-header-icon">📊</span>
                        <h2>Activity Log</h2>
                    </div>
                    <div class="activity-items" id="activityItems">
                        <!-- Activity logs akan ditampilkan di sini -->
                    </div>
                </div>
            </div>

            <!-- PROFILE Page -->
            <div class="page" id="profilePage">
                <div class="content-card">
                    <div class="card-header">
                        <span class="card-header-icon">👤</span>
                        <h2>Profile</h2>
                    </div>
                    <div class="profile-details" id="profileDetails">
                        <!-- Profile info akan ditampilkan di sini -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Border Pagination - Fixed -->
        <div class="border-pagination" id="borderPagination">
            <div class="pagination-content">
                <span class="pagination-info" id="paginationInfo">Halaman 1 dari 1</span>
                <div class="pagination-controls">
                    <button class="pagination-btn" id="prevPageBtn" disabled>
                        <span>◀️</span>
                    </button>
                    <button class="pagination-btn" id="nextPageBtn" disabled>
                        <span>▶️</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Navigation (fixed di bagian bawah) -->
    <nav class="floating-nav" id="floatingNav">
        <button class="nav-item active" data-page="market">
            <span class="nav-icon">🏪</span>
            <span class="nav-text">MARKET</span>
        </button>
        <button class="nav-item" data-page="games">
            <span class="nav-icon">📦</span>
            <span class="nav-text">MY USN</span>
        </button>
        <button class="nav-item" data-page="activity">
            <span class="nav-icon">📊</span>
            <span class="nav-text">ACTIVITY</span>
        </button>
        <button class="nav-item" data-page="profile">
            <span class="nav-icon">👤</span>
            <span class="nav-text">PROFIL</span>
        </button>
    </nav>

    <!-- JavaScript -->
    <script src="/order/js/script.js"></script>
</body>
</html>
