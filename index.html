<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="HandheldFriendly" content="true">
    <meta name="MobileOptimized" content="width">
    <title>INDOTAG MARKET</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Config -->
    <script src="config.js"></script>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Memuat INDOTAG MARKET...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scroll to Top Button -->
    <button class="scroll-top-btn" id="scrollTopBtn">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Main Container -->
    <div class="market-container">
        <!-- Header Card with User Profile -->
        <header class="market-header">
            <div class="header-left">
                <div class="logo-wrapper">
                    <div class="logo-glow"></div>
                    <i class="fas fa-tag"></i>
                </div>
                <div class="brand-text">
                    <h1>INDOTAG</h1>
                    <span class="brand-sub">MARKET</span>
                </div>
            </div>
            
            <div class="header-right" id="userProfileHeader">
                <div class="user-info-loading">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>
            </div>
        </header>

        <!-- Main Content (Non-scrollable container) -->
        <main class="market-main" id="marketMain">
            <!-- Content will be dynamically loaded based on active tab -->
            <div class="page-content active" id="marketPage">
                <!-- Market page content will be injected here -->
            </div>
            <div class="page-content" id="gamesPage">
                <!-- Games page content will be injected here -->
            </div>
            <div class="page-content" id="activityPage">
                <!-- Activity page content will be injected here -->
            </div>
            <div class="page-content" id="profilePage">
                <!-- Profile page content will be injected here -->
            </div>
        </main>

        <!-- Bottom Pagination Bar (Hides on scroll) -->
        <nav class="bottom-nav" id="bottomNav">
            <button class="nav-item active" data-page="market">
                <div class="nav-icon">
                    <i class="fas fa-store"></i>
                </div>
                <span>MARKET</span>
                <div class="nav-glow"></div>
            </button>
            <button class="nav-item" data-page="games">
                <div class="nav-icon">
                    <i class="fas fa-gamepad"></i>
                </div>
                <span>GAMES</span>
                <div class="nav-glow"></div>
            </button>
            <button class="nav-item" data-page="activity">
                <div class="nav-icon">
                    <i class="fas fa-history"></i>
                </div>
                <span>ACTIVITY</span>
                <div class="nav-glow"></div>
            </button>
            <button class="nav-item" data-page="profile">
                <div class="nav-icon">
                    <i class="fas fa-user"></i>
                </div>
                <span>PROFIL</span>
                <div class="nav-glow"></div>
            </button>
            <div class="nav-indicator" id="navIndicator"></div>
        </nav>

        <!-- Filter Panel (Sliding from bottom) -->
        <div class="filter-panel" id="filterPanel">
            <div class="filter-panel-header">
                <div class="filter-panel-handle"></div>
                <h3>Filter Username</h3>
                <button class="filter-close" id="filterClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="filter-panel-content">
                <!-- Type Filter -->
                <div class="filter-section">
                    <label class="filter-label">
                        <i class="fas fa-tag"></i>
                        Type Username
                    </label>
                    <div class="filter-chips" id="typeFilterChips">
                        <button class="chip active" data-type="all">Semua</button>
                        <button class="chip" data-type="OP">OP</button>
                        <button class="chip" data-type="CANON">CANON</button>
                        <button class="chip" data-type="SCANON">SCANON</button>
                        <button class="chip" data-type="SOP">SOP</button>
                        <button class="chip" data-type="TAMPING">TAMPING</button>
                        <button class="chip" data-type="TAMDAL">TAMDAL</button>
                        <button class="chip" data-type="GANHUR">GANHUR</button>
                        <button class="chip" data-type="SWITCH">SWITCH</button>
                        <button class="chip" data-type="KURHUF">KURHUF</button>
                        <button class="chip" data-type="UNCOMMON">UNCOMMON</button>
                    </div>
                </div>

                <!-- Price Range Filter -->
                <div class="filter-section">
                    <label class="filter-label">
                        <i class="fas fa-credit-card"></i>
                        Price Range (Rp)
                    </label>
                    <div class="price-range-inputs">
                        <div class="price-input-wrapper">
                            <span class="price-prefix">Rp</span>
                            <input type="number" id="minPrice" placeholder="Min" min="0" value="0">
                        </div>
                        <span class="price-separator">—</span>
                        <div class="price-input-wrapper">
                            <span class="price-prefix">Rp</span>
                            <input type="number" id="maxPrice" placeholder="Max" min="0" value="999999999">
                        </div>
                    </div>
                </div>

                <!-- Sort By Filter -->
                <div class="filter-section">
                    <label class="filter-label">
                        <i class="fas fa-sort-amount-down"></i>
                        Sort By
                    </label>
                    <div class="filter-select-wrapper">
                        <select id="sortBy">
                            <option value="latest">Lasted (Terbaru)</option>
                            <option value="price_low">Low to High (Harga Terendah)</option>
                            <option value="price_high">High to Low (Harga Tertinggi)</option>
                            <option value="char_asc">Char Ascending (Karakter ↑)</option>
                            <option value="char_desc">Char Descending (Karakter ↓)</option>
                            <option value="alpha_asc">Alphabet Ascending (A-Z)</option>
                            <option value="alpha_desc">Alphabet Descending (Z-A)</option>
                        </select>
                        <i class="fas fa-chevron-down select-arrow"></i>
                    </div>
                </div>

                <!-- Username Tag (placeholder) -->
                <div class="filter-section">
                    <label class="filter-label">
                        <i class="fas fa-at"></i>
                        Username Tag
                    </label>
                    <div class="username-tag-placeholder">
                        <i class="fas fa-clock"></i>
                        <span>Coming Soon</span>
                    </div>
                </div>
            </div>

            <div class="filter-panel-footer">
                <button class="filter-btn reset" id="resetFilters">
                    <i class="fas fa-undo-alt"></i>
                    Reset
                </button>
                <button class="filter-btn apply" id="applyFilters">
                    <i class="fas fa-check"></i>
                    Terapkan
                </button>
            </div>
        </div>
    </div>

    <!-- Templates -->
    <template id="marketUsernameTemplate">
        <div class="username-card">
            <div class="card-glow"></div>
            <div class="card-header">
                <div class="username-wrapper">
                    <span class="username-prefix">@</span>
                    <span class="username"></span>
                </div>
                <span class="username-type-badge"></span>
            </div>
            <div class="card-body">
                <div class="based-on-row">
                    <i class="fas fa-pencil-alt"></i>
                    <span class="based-on-label">Based On:</span>
                    <span class="based-on-value"></span>
                </div>
                <div class="price-row">
                    <i class="fas fa-credit-card"></i>
                    <span class="price-value"></span>
                </div>
            </div>
            <div class="card-footer">
                <button class="action-btn view-btn">
                    <i class="fas fa-eye"></i>
                    Lihat Detail
                </button>
                <button class="action-btn buy-btn">
                    <i class="fas fa-shopping-cart"></i>
                    Beli
                </button>
            </div>
        </div>
    </template>

    <template id="activityItemTemplate">
        <div class="activity-item">
            <div class="activity-icon">
                <i class="fas"></i>
            </div>
            <div class="activity-content">
                <div class="activity-title"></div>
                <div class="activity-meta">
                    <span class="activity-username"></span>
                    <span class="activity-time"></span>
                </div>
            </div>
        </div>
    </template>

    <template id="profileUsernameTemplate">
        <div class="profile-username-item">
            <div class="profile-username-info">
                <span class="profile-username-prefix">@</span>
                <span class="profile-username-name"></span>
            </div>
            <span class="profile-username-type"></span>
            <div class="profile-username-price"></div>
        </div>
    </template>

    <template id="gamesPlaceholderTemplate">
        <div class="games-placeholder">
            <div class="placeholder-glow"></div>
            <i class="fas fa-gamepad"></i>
            <h3>GAMES</h3>
            <p>Coming Soon</p>
            <div class="placeholder-shine"></div>
        </div>
    </template>

    <!-- JavaScript -->
    <script src="/order/js/script.js"></script>
</body>
</html>
