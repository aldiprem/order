<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Daftar - Aplikasi Anda</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts untuk icon Google -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Selamat Datang! 👋</h1>
            <p>Silakan login atau buat akun baru untuk memulai</p>
        </div>
        
        <div class="form-container">
            <div class="toggle-buttons">
                <button class="toggle-btn active" onclick="switchMode('login')">Login</button>
                <button class="toggle-btn" onclick="switchMode('register')">Daftar</button>
            </div>
            
            <!-- Form Login -->
            <div id="loginForm" class="form active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginIdentifier">Username atau Email</label>
                        <input type="text" id="loginIdentifier" placeholder="Masukkan username atau email" required>
                        <div class="error-message" id="loginIdentifierError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Masukkan password" required>
                        <div class="error-message" id="loginPasswordError"></div>
                    </div>
                    
                    <button type="submit" class="submit-btn">Login</button>
                </form>
                
                <!-- Divider -->
                <div class="divider">
                    <span>atau</span>
                </div>
                
                <!-- Tombol Google Login -->
                <button onclick="handleGoogleLogin()" class="google-btn">
                    <i class="fab fa-google"></i>
                    Lanjutkan dengan Google
                </button>
                
                <div class="footer">
                    Belum punya akun? <a onclick="switchMode('register')">Daftar sekarang</a>
                </div>
            </div>
            
            <!-- Form Registrasi -->
            <div id="registerForm" class="form">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="regUsername">Username</label>
                        <input type="text" id="regUsername" placeholder="Pilih username" required>
                        <div class="error-message" id="regUsernameError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" placeholder="Masukkan email" required>
                        <div class="error-message" id="regEmailError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" placeholder="Buat password" required oninput="checkPasswordStrength()">
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                        <div class="error-message" id="regPasswordError"></div>
                    </div>
                    
                    <button type="submit" class="submit-btn">Daftar</button>
                </form>
                
                <!-- Divider -->
                <div class="divider">
                    <span>atau</span>
                </div>
                
                <!-- Tombol Google Register -->
                <button onclick="handleGoogleLogin()" class="google-btn">
                    <i class="fab fa-google"></i>
                    Daftar dengan Google
                </button>
                
                <div class="footer">
                    Sudah punya akun? <a onclick="switchMode('login')">Login disini</a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Notifikasi -->
    <div id="notification" class="notification">
        <div class="notification-title" id="notificationTitle"></div>
        <div class="notification-message" id="notificationMessage"></div>
    </div>

    <!-- Google Platform Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/script.js"></script>
</body>
</html>
