<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Daftar - Telegram App</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Kartu Telegram User (akan muncul otomatis) -->
        <div id="telegramCard" class="telegram-card" style="display: none;">
            <div class="telegram-header">
                <div class="telegram-avatar" id="telegramAvatar"></div>
                <div class="telegram-info">
                    <h3 id="telegramName">Loading...</h3>
                    <p id="telegramUsername">@loading</p>
                    <span id="premiumBadge" class="premium-badge">PREMIUM</span>
                </div>
            </div>
        </div>

        <!-- Kartu Login/Register -->
        <div class="auth-card">
            <div class="auth-header">
                <h1 id="formTitle">Login</h1>
                <p id="formSubtitle">Masuk ke akun Anda</p>
            </div>

            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>Memproses...</p>
            </div>

            <!-- Form Login/Register -->
            <form id="authForm" class="auth-form">
                <!-- Username field (selalu tampil) -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                </div>

                <!-- Email field (selalu tampil) -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Masukkan email" required>
                </div>

                <!-- Password field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                </div>

                <!-- Tombol submit -->
                <button type="submit" id="submitBtn" class="btn btn-primary">Login</button>
            </form>

            <!-- Toggle antara Login dan Register -->
            <div class="toggle-auth">
                <span id="toggleText">Belum punya akun?</span>
                <button id="toggleBtn" class="btn-link">Daftar</button>
            </div>

            <!-- Divider -->
            <div class="divider">
                <span>atau</span>
            </div>

            <!-- Tombol Telegram (tetap ada) -->
            <button id="telegramBtn" class="btn btn-telegram">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.28-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.04-.48-.82-.27-1.47-.42-1.42-.89.03-.24.27-.48.74-.74 2.02-1.01 5.03-2.15 5.57-2.38 2.66-1.1 3.21-1.29 3.57-1.29.08 0 .26.02.38.12.1.08.13.19.14.27-.01.07-.02.23-.04.36z"/>
                </svg>
                Lanjutkan dengan Telegram
            </button>
        </div>

        <!-- Hidden input untuk menyimpan data Telegram -->
        <input type="hidden" id="telegramData" value="">
    </div>

    <script src="js/main.js"></script>
</body>
</html>
