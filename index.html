<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="HandheldFriendly" content="true">
    <meta name="MobileOptimized" content="width">
    <title>INDOTAG MARKET • Premium Username</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/order/css/panel.css">
    <link rel="stylesheet" href="/order/css/style.css">
    
    <!-- Config -->
    <script src="/order/config.js"></script>
</head>
<body>
    <!-- Premium Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-logo">
            <i class="fas fa-crown"></i>
        </div>
        <div class="loading-spinner"></div>
        <div class="loading-text">INDOTAG <span>MARKET</span></div>
        <div class="loading-sub">Premium Username Marketplace</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scroll to Top Button -->
    <button class="scroll-top-btn" id="scrollTopBtn">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Main Container -->
    <div class="market-container">
        <!-- Premium Header -->
        <header class="market-header">
            <div class="header-bg"></div>
            <div class="header-content">
                <div class="header-left">
                    <div class="logo-wrapper">
                        <i class="fas fa-crown"></i>
                    </div>
                    <div class="brand-text">
                        <h1>INDOTAG</h1>
                        <span class="brand-sub">PREMIUM MARKET</span>
                    </div>
                </div>
                
                <div class="header-right" id="userProfileHeader">
                    <div class="user-info-loading">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="market-main" id="marketMain">
            <div class="page-content active" id="marketPage"></div>
            <div class="page-content" id="gamesPage"></div>
            <div class="page-content" id="activityPage"></div>
            <div class="page-content" id="profilePage"></div>
        </main>

        <!-- Premium Bottom Navigation -->
        <nav class="bottom-nav" id="bottomNav">
            <div class="nav-container">
                <button class="nav-item active" data-page="market">
                    <div class="nav-icon">
                        <i class="fas fa-store"></i>
                    </div>
                    <span>MARKET</span>
                </button>
                <button class="nav-item" data-page="games">
                    <div class="nav-icon">
                        <i class="fas fa-dice-d6"></i>
                    </div>
                    <span>GAMES</span>
                </button>
                <button class="nav-item" data-page="activity">
                    <div class="nav-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <span>ACTIVITY</span>
                </button>
                <button class="nav-item" data-page="profile">
                    <div class="nav-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <span>PROFILE</span>
                </button>
            </div>
            <div class="nav-indicator" id="navIndicator"></div>
        </nav>

        <!-- Premium Username Detail Panel -->
        <div class="username-panel" id="usernamePanel">
            <div class="panel-handle"></div>
            
            <div class="panel-header">
                <div class="panel-header-left">
                    <button class="panel-action-btn" id="panelCartBtn">
                        <i class="fas fa-shopping-bag"></i>
                    </button>
                </div>
                <div class="panel-title">DETAIL USERNAME</div>
                <button class="panel-action-btn" id="panelCloseBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="panel-content" id="panelContent">
                <div class="panel-loading" id="panelLoading">
                    <div class="panel-spinner"></div>
                    <div class="panel-loading-text">Memuat detail username...</div>
                </div>
                
                <div class="panel-detail" id="panelDetail" style="display: none;">
                    <div class="detail-header">
                        <h2 class="username-title" id="panelUsername">@username</h2>
                        <span class="username-badge" id="panelBadge">PREMIUM</span>
                    </div>
                    
                    <div class="info-container">
                        <div class="info-grid" id="panelInfoGrid"></div>
                    </div>
                </div>
            </div>
            
            <div class="panel-footer">
                <button class="panel-btn btn-offer" id="panelOfferBtn">
                    <i class="fas fa-gavel"></i>
                    MAKE OFFER
                </button>
                <button class="panel-btn btn-buy" id="panelBuyBtn">
                    <i class="fas fa-bolt"></i>
                    BUY NOW
                </button>
            </div>
        </div>
        
        <!-- Panel Overlay -->
        <div class="panel-overlay" id="panelOverlay"></div>

        <!-- Premium Filter Panel -->
        <div class="filter-panel" id="filterPanel">
            <div class="filter-panel-handle"></div>
            
            <div class="filter-panel-header">
                <h3><i class="fas fa-sliders-h"></i> FILTER USERNAME</h3>
                <button class="filter-close" id="filterClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="filter-panel-content">
                <!-- Type Filter -->
                <div class="filter-section">
                    <div class="filter-section-header">
                        <i class="fas fa-tag"></i>
                        <span>TYPE USERNAME</span>
                    </div>
                    <div class="filter-chips" id="typeFilterChips">
                        <button class="chip active" data-type="all">All</button>
                        <button class="chip" data-type="OP">OP</button>
                        <button class="chip" data-type="CANON">CANON</button>
                        <button class="chip" data-type="SCANON">SCANON</button>
                        <button class="chip" data-type="SOP">SOP</button>
                        <button class="chip" data-type="TAMPING">TAMPING</button>
                        <button class="chip" data-type="TAMDAL">TAMDAL</button>
                        <button class="chip" data-type="GANHUR">GANHUR</button>
                        <button class="chip" data-type="SWITCH">SWITCH</button>
                        <button class="chip" data-type="KURHUF">KURHUF</button>
                    </div>
                </div>

                <!-- Price Range -->
                <div class="filter-section">
                    <div class="filter-section-header">
                        <i class="fas fa-coins"></i>
                        <span>PRICE RANGE</span>
                    </div>
                    <div class="price-range-inputs">
                        <div class="price-input-group">
                            <span class="price-label">MIN</span>
                            <div class="price-input-wrapper">
                                <span class="price-prefix">Rp</span>
                                <input type="number" id="minPrice" placeholder="0" min="0" value="0">
                            </div>
                        </div>
                        <div class="price-separator">
                            <i class="fas fa-minus"></i>
                        </div>
                        <div class="price-input-group">
                            <span class="price-label">MAX</span>
                            <div class="price-input-wrapper">
                                <span class="price-prefix">Rp</span>
                                <input type="number" id="maxPrice" placeholder="999M" min="0" value="999999999">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sort By -->
                <div class="filter-section">
                    <div class="filter-section-header">
                        <i class="fas fa-sort-amount-down"></i>
                        <span>SORT BY</span>
                    </div>
                    <div class="filter-select-wrapper">
                        <select id="sortBy">
                            <option value="latest">📅 Terbaru</option>
                            <option value="price_low">💰 Harga Terendah</option>
                            <option value="price_high">💎 Harga Tertinggi</option>
                            <option value="char_asc">📊 Karakter ↑</option>
                            <option value="char_desc">📊 Karakter ↓</option>
                            <option value="alpha_asc">🔤 A-Z</option>
                            <option value="alpha_desc">🔤 Z-A</option>
                        </select>
                        <i class="fas fa-chevron-down select-arrow"></i>
                    </div>
                </div>

                <!-- Username Tag (Coming Soon) -->
                <div class="filter-section coming-soon">
                    <div class="filter-section-header">
                        <i class="fas fa-hashtag"></i>
                        <span>USERNAME TAG</span>
                        <span class="coming-badge">SOON</span>
                    </div>
                </div>
            </div>

            <div class="filter-panel-footer">
                <button class="filter-btn reset" id="resetFilters">
                    <i class="fas fa-redo-alt"></i>
                    RESET
                </button>
                <button class="filter-btn apply" id="applyFilters">
                    <i class="fas fa-check"></i>
                    APPLY FILTERS
                </button>
            </div>
        </div>
    </div>

    <!-- Templates -->
    <template id="marketUsernameTemplate">
        <div class="username-card">
            <div class="card-header">
                <div class="username-wrapper">
                    <span class="username-prefix">@</span>
                    <span class="username"></span>
                </div>
                <span class="username-type-badge"></span>
            </div>
            <div class="card-body">
                <div class="based-on-info">
                    <i class="fas fa-link"></i>
                    <span class="based-on-value"></span>
                </div>
            </div>
            <div class="card-footer">
                <div class="price-bubble">
                    <i class="fas fa-coins"></i>
                    <span class="price-value"></span>
                </div>
            </div>
            <div class="card-glow"></div>
        </div>
    </template>

    <template id="activityItemTemplate">
        <div class="activity-item">
            <div class="activity-icon">
                <i class="fas"></i>
            </div>
            <div class="activity-content">
                <div class="activity-title"></div>
                <div class="activity-meta">
                    <span class="activity-username"></span>
                    <span class="activity-time"><i class="far fa-clock"></i> <span></span></span>
                </div>
            </div>
        </div>
    </template>

    <template id="activitySkeletonTemplate">
        <div class="activity-skeleton">
            <div class="skeleton-icon"></div>
            <div class="skeleton-content">
                <div class="skeleton-line" style="width: 60%;"></div>
                <div class="skeleton-line" style="width: 40%;"></div>
            </div>
        </div>
    </template>

    <template id="profileUsernameTemplate">
        <div class="profile-username-item">
            <div class="profile-username-info">
                <i class="fas fa-at"></i>
                <span class="profile-username-name"></span>
            </div>
            <span class="profile-username-type"></span>
            <span class="profile-username-price"></span>
        </div>
    </template>

    <template id="gamesPlaceholderTemplate">
        <div class="games-placeholder">
            <div class="games-icon">
                <i class="fas fa-dice-d6"></i>
            </div>
            <h3>GAMES HUB</h3>
            <p>Coming Soon • Q2 2024</p>
            <div class="games-features">
                <span><i class="fas fa-check"></i> Spin & Win</span>
                <span><i class="fas fa-check"></i> Daily Rewards</span>
                <span><i class="fas fa-check"></i> Leaderboard</span>
            </div>
        </div>
    </template>

    <!-- JavaScript -->
    <script src="/order/js/script.js"></script>
    <script src="/order/js/sound.js"></script>
</body>
</html>
